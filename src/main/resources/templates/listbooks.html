<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Livros</title>
    <link rel="stylesheet" href="/css/Style.css">
    <link rel="stylesheet" href="/css/addbook.css">
</head>
<body>
<main class="page-shell">
    <section class="card">
        <div class="page-header">
            <div>
                <h1>Lista de Livros</h1>
                <p class="muted">Visualize e mantenha o catalogo atualizado.</p>
            </div>
            <div class="page-actions">
                <a href="/" class="btn btn-outline">Inicio</a>
                <a th:href="@{/addbook}" class="btn btn-primary">Adicionar livro</a>
            </div>
        </div>

        <div class="table-wrap">
            <table class="data-table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Ano</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.publishDate}"></td>
            <td class="actions-cell">
                <a th:href="@{'/editbook/' + ${book.id}}" class="btn btn-small btn-outline">Editar</a>
                <a th:href="@{'/deletebook/' + ${book.id}}" class="btn btn-small btn-danger"
                   onclick="return confirm('Tem certeza que deseja deletar este livro?');">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>
        </div>
    </section>
</main>
</body>
</html>
