<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Livros</title>
</head>
<body>
<div>
    <h1>Lista de Livros</h1>
    <a th:href="addbook">adiciona livros</a>

    <table >
    <table >
        <thead>
        <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Ano</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.publishDate}"></td>
            <td>
                <a th:href="@{'/editbook/' + ${book.id}}" class="button">Editar</a>
                <a th:href="@{'/deletebook/' + ${book.id}}" class="button delete"
                   onclick="return confirm('Tem certeza que deseja deletar este livro?');">Deletar</a>
            </td>
        </tr >
        </tbody>
    </table>

</div>
</body>
</html>
