<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Adicionar livro</title>
    <link rel="stylesheet" href="/css/Style.css">
    <link rel="stylesheet" href="/css/addbook.css">
</head>
<body>
<main class="page-shell">
    <section class="card form-card">
        <div class="page-header">
            <div>
                <h1>Adicionar Livro</h1>
                <p class="muted">Preencha os dados para incluir um novo livro no catálogo.</p>
            </div>
            <a th:href="@{/listbooks}" class="btn btn-outline">Voltar à lista</a>
        </div>

        <p class="form-error" th:if="${uploadError}" th:text="${uploadError}"></p>

        <form th:action="@{/addbook}" th:object="${book}" method="post" enctype="multipart/form-data" class="book-form">
            <fieldset>
                <label for="title">Título</label>
                <input th:field="*{title}" type="text" id="title" placeholder="Ex.: O Principezinho" required>
            </fieldset>

            <fieldset>
                <label for="author">Autor</label>
                <input th:field="*{author}" type="text" id="author" placeholder="Ex.: Antoine de Saint-Exupery" required>
            </fieldset>

            <fieldset>
                <label for="publishdate">Data de publicação</label>
                <input th:field="*{publishDate}" type="date" id="publishdate" required>
            </fieldset>

            <fieldset>
                <label for="coverFile">Capa do livro</label>
                <input id="coverFile" name="coverFile" type="file" accept="image/png, image/jpeg, image/webp" data-cover-input>
                <small class="muted">Formatos: JPG, PNG, WEBP (máx. 2 MB).</small>
            </fieldset>

            <div class="cover-preview-wrap">
                <img class="cover-preview" src="/img/cover-placeholder.svg" alt="Pré-visualização da capa" data-cover-preview>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Adicionar</button>
            </div>
        </form>
    </section>
</main>

<script th:src="@{/js/book-cover-preview.js}"></script>
</body>
</html>
