<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Livro</title>
    <link rel="stylesheet" href="/css/Style.css">
    <link rel="stylesheet" href="/css/addbook.css">
</head>
<body>
<main class="page-shell">
    <section class="card form-card">
        <div class="page-header">
            <div>
                <h1>Editar Livro</h1>
                <p class="muted">Atualize as informacoes do livro selecionado.</p>
            </div>
            <a th:href="@{/listbooks}" class="btn btn-outline">Voltar para lista</a>
        </div>

        <form th:action="@{/editbook}" th:object="${book}" method="post" class="book-form">
            <input type="hidden" th:field="*{id}" />

            <fieldset>
                <label for="title">Titulo</label>
                <input th:field="*{title}" type="text" id="title" required>
            </fieldset>

            <fieldset>
                <label for="author">Autor</label>
                <input th:field="*{author}" type="text" id="author" required>
            </fieldset>

            <fieldset>
                <label for="publishdate">Data de Publicacao</label>
                <input th:field="*{publishDate}" type="date" id="publishdate" required>
            </fieldset>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salvar alteracoes</button>
            </div>
        </form>
    </section>
</main>

</body>
</html>
